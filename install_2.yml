---

- hosts: all
  become: true
  
  vars:
    ansible_python_interpreter: /usr/bin/python3

  pre_tasks:
    - name: install updates (Rocky Linux)
      dnf:
        update_only: yes
        update_cache: yes
      when: ansible_facts["distribution"] == "Rocky"

    - name: install updates (Ubuntu)
      apt:
        upgrade: dist
        update_cache: yes
      when: ansible_facts["distribution"] == "Ubuntu"

- hosts: web_servers
  become: true

  vars:
    ansible_python_interpreter: /usr/bin/python3
  tasks:
    - name: install apache and php for Ubuntu servers
      apt:
        name:
          - apache2
          - libapache2-mod-php
        state: latest
      when: ansible_facts["distribution"] == "Ubuntu"

    - name: install apache and php for Rocky servers
      dnf:
        name:
          - httpd
          - php
        state: latest
      when: ansible_facts["distribution"] == "Rocky"

- hosts: db_servers
  become: true
  tasks:

  - name: install mariadb package (Ubuntu)
    apt:
      name: mariadb-server
      state: latest
    when: ansible_facts["distribution"] == "Ubuntu"

- hosts: file_servers
  become: true
  tasks:

    - name: install samba package
      package:
        name: samba
        state: latest
    


