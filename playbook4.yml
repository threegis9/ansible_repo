---

- hosts: all
  become: true
  
  vars:
    ansible_python_interpreter: /usr/bin/python3

  pre_tasks:
    - name: install updates (Rocky Linux)
      tags: always
      dnf:
        update_only: yes
        update_cache: yes
      when: ansible_facts["distribution"] == "Rocky"

    - name: install updates (Ubuntu)
      tags: always
      apt:
        upgrade: dist
        update_cache: yes
      when: ansible_facts["distribution"] == "Ubuntu"

- hosts: file_servers
  become: true
  tasks:
    - name: install unzip
      apt:
        name: unzip
        state: present
        update_cache: yes

- hosts: web_servers
  become: true
 
  vars:
    ansible_python_interpreter: /usr/bin/python3
  tasks:
    - name: install apache and php for Ubuntu servers
      tags: apache,apache2,ubuntu
      apt:
        name:
          - apache2
          - libapache2-mod-php
        state: latest
      when: ansible_facts["distribution"] == "Ubuntu"

    - name: change e-mail address for admin
      tags: apache,centos,httpd
      lineinfile: 
        path: /etc/httpd/conf/httpd.conf
        regexp: '^ServerAdmin'
        line: ServerAdmin somebody@somewhere.net
      when: ansible_facts["distribution"] == "Rocky"
      register: httpd

    - name: restart httpd (Rocky)
      tags: apache,rocky,httpd
      service:
        name: httpd
        state: restarted
      when: httpd.changed

    - name: copy default html file for site
      tags: apache,apache2,httpd
      copy:
        src: default_site.html
        dest: /var/www/html/index.html
        owner: root
        group: root 
        mode: 0644

    - name: install apache and php for Rocky servers
      tags: apache,httpd,rocky,linux 
      dnf:
        name:
          - httpd
          - php
        state: latest
      when: ansible_facts["distribution"] == "Rocky"

    - name: start httpd (Rocky)
      tags: apache,rocky,httpd
      service:
        name: httpd
        state: started
        enabled: yes
      when: ansible_facts["distribution"] == "Rocky"

- hosts: db_servers
  become: true
  tasks:

  - name: install mariadb package (Ubuntu)
    tags: db,mariadb,ubuntu
    apt:
      name: mariadb-server
      state: latest
    when: ansible_facts["distribution"] == "Ubuntu"

- hosts: file_servers
  become: true
  tasks:

    - name: install samba package
      tags: samba
      package:
        name: samba
        state: latest
    


